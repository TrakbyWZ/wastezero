name: Deploy Supabase DB

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - ".github/workflows/deploy-db.yml"

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      PROJECT_REF: ${{ secrets.PROJECT_REF }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Link Supabase project
        run: |
          PROJECT_REF="${NEXT_PUBLIC_SUPABASE_URL#https://}"
          PROJECT_REF="${PROJECT_REF%%.supabase.co*}"
          pnpm exec supabase link --project-ref "$PROJECT_REF" --password "$POSTGRES_PASSWORD"

      - name: Lint database changes
        run: pnpm exec supabase db lint --linked

      - name: Deploy database changes
        run: pnpm exec supabase db push --linked
